<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Koilp · 作品集导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #f5f7fe 0%, #e9eef8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* 主卡片容器 */
        .card {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 3rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.6);
            transition: transform 0.2s ease;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        /* 作者头像占位 / 图标装饰 */
        .avatar {
            font-size: 4.5rem;
            margin-bottom: 1rem;
            display: inline-block;
            background: #ffffffcc;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffffff, #f0f4ff);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1);
            margin-bottom: 1.5rem;
        }

        .avatar span {
            font-size: 3.8rem;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(125deg, #1e2b3c, #2c4c7c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .badge {
            display: inline-block;
            background: #eef2ff;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1e40af;
            margin-bottom: 1.2rem;
        }

        .intro-text {
            font-size: 1.1rem;
            line-height: 1.5;
            color: #2d3a4a;
            margin: 1.5rem 0 1rem;
            font-weight: 450;
        }

        .intro-text strong {
            color: #0f2b3d;
            font-weight: 600;
        }

        .divider {
            width: 80px;
            height: 3px;
            background: #3b82f6;
            margin: 1.8rem auto 1.2rem;
            border-radius: 4px;
            opacity: 0.6;
        }

        /* 按钮样式 */
        .btn-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #0f172a;
            color: white;
            text-decoration: none;
            padding: 0.9rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.25s;
            margin-top: 1rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
        }

        .btn-link i {
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .btn-link:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 14px 24px -10px rgba(37,99,235,0.4);
        }

        .btn-link:hover i {
            transform: translateX(4px);
        }

        /* 页脚注释 */
        .footnote {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #5b6e8c;
            border-top: 1px solid #dce3ec;
            padding-top: 1.5rem;
        }

        @media (max-width: 550px) {
            .card {
                padding: 1.8rem;
            }
            h1 {
                font-size: 2.2rem;
            }
            .intro-text {
                font-size: 1rem;
            }
        }
    </style>
    <!-- Font Awesome 6 (免费图标) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="card">
    <!-- 视觉头像 / 代表 Koilp -->
    <div class="avatar">
        <span>🛠️</span>
    </div>
    
    <h1>Koilp</h1>
    <div class="badge">
        <i class="fas fa-code"></i> 创作者 · 模组开发者
    </div>

    <div class="intro-text">
        <strong>Koilp</strong> 是一位热爱Lua语言的独立创作者，<br>
        专注于 <strong>Gorebox 模组生态</strong> 与交互工具的开发。<br>
        其作品以细腻的细节和开放的设计理念，为玩家社区带来全新可能。
    </div>

    <div class="divider"></div>

    <!-- 跳转按钮 — 请将下面的 href 替换为正确的可用链接 -->
    <a href="https://gorebox-modding-api.web.app/" class="btn-link" id="navButton" target="_blank" rel="noopener noreferrer">
        <span>🚀 前往 Gorebox Modding API</span>
        <i class="fas fa-arrow-right"></i>
    </a>
    
    <div class="footnote">
        <i class="fas fa-external-link-alt"></i> 点击按钮将跳转至 Koilp 相关的 API 文档站
    </div>
</div>

<script>
    (function() {
        // 可选的提示：如果链接无法访问，给予友好反馈（前端不能检测跨域资源状态，但可以提醒）
        const btn = document.getElementById('navButton');
        const originalHref = btn.getAttribute('href');
        
        // 附加一点小交互：点击时如果链接是占位或无法访问，控制台提示（不过用户会正常跳转）
        btn.addEventListener('click', function(e) {
            // 如果链接是当前示例页面的自身或是无效内容，可以提醒（但这里只是增加体验）
            // 由于真正的链接可能无法访问，我们仅加一个视觉反馈，不阻止跳转
            console.log(`🔗 正在尝试打开: ${originalHref}`);
            // 可选：如果希望用户确认跳转，可取消下一行注释
            // if (!confirm(`即将跳转至外部站点:\n${originalHref}\n请确保链接可用。`)) {
            //     e.preventDefault();
            // }
        });
        
        // 为了更稳健，如果检测到链接无法打开（无法实际检测跨域），但在当前页面增加一个友好状态
        // 只是让按钮有个动态效果，不破坏功能
        btn.style.transition = 'all 0.2s';
    })();
</script>

</body>
</html>
